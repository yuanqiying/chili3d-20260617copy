appId: com.chili3d.app
productName: Chili3D
copyright: Copyright © 2026 Chili3D
directories:
  output: release
  buildResources: public
files:
  - dist/**/*
  - electron/**/*
  - public/favicon.svg
win:
  target:
    - target: nsis
      arch: [x64]
  artifactName: Chili3D-${version}-win-x64.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  artifactName: Chili3D-${version}-mac-${arch}.${ext}
  category: public.app-category.productivity
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  artifactName: Chili3D-${version}-linux-${arch}.${ext}
  category: Graphics
